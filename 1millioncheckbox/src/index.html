<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Grid - Light Edition</title>

    <style>
      :root {
        --bg: #f5f5f7;
        --panel: #ffffff;
        --border: rgba(0, 0, 0, 0.05);
        --accent: #000000;
        --shadow: rgba(0, 0, 0, 0.08);
        --text: #1d1d1f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 10px 20px; /* reduced */
        font-family:
          "Inter",
          -apple-system,
          system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        width: 100%;
        max-width: 2400px;
        margin-bottom: 10px; /* reduced */
        text-align: left;
        animation: fadeIn 0.8s ease-out;
      }

      h1 {
        font-size: clamp(32px, 5vw, 56px);
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.05em;
        color: var(--text);
      }

      #container {
        width: 100%;
        max-width: 2400px;
        height: 85vh;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: 40px;
        overflow-y: auto;

        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
        gap: 16px;

        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.04),
          0 1px 3px rgba(0, 0, 0, 0.02);

        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 32px;
        height: 32px;
        background: #fdfdfd;
        border: 1px solid #e5e5e7;
        border-radius: 10px;
        cursor: pointer;
        position: relative;
        transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        margin: 0 auto;

        animation: reveal 0.6s cubic-bezier(0.2, 1, 0.2, 1) both;
      }

      input[type="checkbox"]:nth-child(n) {
        animation-delay: calc(var(--i, 0) * 0.0015s);
      }

      input[type="checkbox"]:hover {
        background: #fff;
        border-color: #000;
        transform: translateY(-4px) scale(1.1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        z-index: 2;
      }

      input[type="checkbox"]:checked {
        background: var(--accent);
        border-color: var(--accent);
        transform: scale(0.9);
      }

      input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        inset: 10px;
        background: #fff;
        border-radius: 50%;
        animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(15px) scale(0.8);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes pop {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      #container::-webkit-scrollbar {
        width: 6px;
      }
      #container::-webkit-scrollbar-thumb {
        background: #e5e5e7;
        border-radius: 10px;
      }
      #container::-webkit-scrollbar-thumb:hover {
        background: #d1d1d6;
      }

      @media (max-width: 768px) {
        #container {
          padding: 20px;
          border-radius: 24px;
          gap: 10px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>1 million checkbox</h1>
    </header>

    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const fragments = document.createDocumentFragment();

      const inputs = [];
      for (let i = 0; i < 1000000; i++) {
        const input = document.createElement("input");
        input.type = "checkbox";

        inputs.push(input);

        input.addEventListener("click", () => {
          socket.emit("user:clicked", i);
        });
        input.style.setProperty("--i", i);

        socket.on("server:clicked", (index) => {
          inputs[index].checked = true;
        });
        fragments.appendChild(input);
      }

      container.appendChild(fragments);
    </script>
  </body>
</html>
